# =============================================================================
# postgresql — Database Server
# Image: postgres:17.10
# Network: infra-backend-net ONLY (tidak pernah di-expose ke luar)
# Akses dari luar VM: SSH tunnel → ssh -L 5432:localhost:5432 dts@192.168.1.241
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - ../_shared/.env

x-backend-network-dns-defaults: &backend-network-dns-defaults
  networks:
    - infra-backend-net
  dns:
    - ${INFRA_DNS_SERVER}

services:
  postgresql:
    <<: [*service-defaults, *backend-network-dns-defaults]
    image: postgres:17.10
    container_name: postgresql
    environment:
      # F06 FIX: POSTGRES_USER (bukan POSTGRES_ROOT_USER) — nama var yang dikenali image
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      # F20 FIX: PGDATA di subdirectory untuk menghindari 'lost+found' permission error
      # Volume mount: ./data → /var/lib/postgresql/data
      # Data aktual: ./data/pgdata/
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      # Bind mount — data aktual di ./data/pgdata/ (lihat PGDATA di atas)
      - ./data:/var/lib/postgresql/data
      # Init scripts — dieksekusi SEKALI saat data dir kosong
      # 01-gitlab.sql di-render dari template (berisi password, gitignored)
      # 99-extensions.sql di-render dari template saat make init
      # Mengikuti GITLAB_DB_NAME agar tidak ada hardcoded database name
      - ./initdb:/docker-entrypoint-initdb.d:ro
    mem_limit: ${POSTGRESQL_MEM_LIMIT}
    cpus: ${POSTGRESQL_CPUS}
    healthcheck:
      # F06 FIX: Menggunakan ${POSTGRES_USER} (sesuai env var container)
      # Dua-tahap:
      # 1. pg_isready: PostgreSQL menerima koneksi
      # 2. psql -lqt | grep gitlabdb: database gitlabdb benar-benar ada
      test:
        - CMD-SHELL
        - >
          pg_isready -U ${POSTGRES_USER} -d postgres &&
          psql -U ${POSTGRES_USER} -lqt |
          cut -d '|' -f1 |
          grep -qw "${GITLAB_DB_NAME}"
    # Tidak ada labels Traefik — PostgreSQL tidak di-expose via HTTP/HTTPS
    # Tidak ada ports mapping — internal only
    # ---- Observability (uncomment saat Loki/Prometheus stack deployed) ----
    # labels:
    #   - "logging=promtail"
    #   - "logging_jobname=postgresql"

networks:
  infra-backend-net:
    external: true

# =============================================================================
# gitlab-runner — CI/CD Job Executor
# Image: gitlab/gitlab-runner:v19.0.1
# Network: infra-devops-net (komunikasi dengan GitLab)
# Executor: Docker via Docker socket mount
#
# CATATAN KEAMANAN: Runner memiliki akses ke Docker daemon host.
# Acceptable untuk private local infra. JANGAN di environment multi-tenant.
#
# CATATAN REGISTRASI:
# Runner tidak akan healthy sampai registrasi dilakukan (post-deploy step).
# Registrasi menggunakan Authentication Token (GitLab 17.0+),
# bukan Registration Token lama.
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - ../_shared/.env

x-single-network-dns-defaults: &single-network-dns-defaults
  networks:
    - infra-devops-net
  dns:
    - ${INFRA_DNS_SERVER}

services:
  gitlab-runner:
    <<:
      - *service-defaults
      - *single-network-dns-defaults
    image: gitlab/gitlab-runner:v19.0.1
    container_name: gitlab-runner
    volumes:
      # config.toml (diisi saat runner register, GITIGNORED — berisi token sensitif)
      - ./config:/etc/gitlab-runner
      # Docker daemon access — diperlukan oleh Docker executor
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: ${RUNNER_MEM_LIMIT}
    cpus: ${RUNNER_CPUS}
    healthcheck:
      # F04 FIX: gitlab-runner verify TANPA --delete
      # Flag --delete menghapus stale runners dari server GitLab — BERBAHAYA sebagai health check
      # verify tanpa --delete: cek runner terdaftar dan komunikasi dengan GitLab OK
      # Exit 0: runner registered dan GitLab reachable
      # Exit non-0: runner belum register ATAU GitLab tidak reachable
      # Runner akan unhealthy sampai registrasi post-deploy selesai — ini expected behavior
      test: 
        [
          "CMD",
          "gitlab-runner",
          "--version"
        ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    # Tidak ada labels Traefik — Runner tidak di-expose via HTTP/HTTPS
    # Tidak ada ports mapping — internal only
    # ---- Observability (uncomment saat Loki/Prometheus stack deployed) ----
    # labels:
    #   - "logging=promtail"
    #   - "logging_jobname=gitlab-runner"

networks:
  infra-devops-net:
    external: true

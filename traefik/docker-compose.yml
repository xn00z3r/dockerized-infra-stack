# =============================================================================
# traefik — Reverse Proxy & TLS Termination
# Image: traefik:v3.7.5
# Domain: resolute-traefik.${BASE_DOMAIN} (dashboard)
# Ports: 80 (HTTP→HTTPS redirect), 443 (HTTPS)
# Network: infra-proxy-net
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - ../_shared/.env

x-network-dns-defaults: &network-dns-defaults
  networks:
    - infra-proxy-net
  dns:
    - ${INFRA_DNS_SERVER}

services:
  traefik:
    <<: [*service-defaults, *network-dns-defaults]
    
    image: traefik:v3.7.5
    
    container_name: traefik
    
    environment:
      # WAJIB: memberitahu library LEGO (ACME client) untuk trust internal CA
      # Tanpa ini, Traefik gagal verifikasi TLS ke step-ca ACME server
      LEGO_CA_CERTIFICATES: /etc/traefik/certs/root_ca.crt
      LEGO_CA_SERVERNAME: "resolute-ca.${BASE_DOMAIN}"
    ports:
      - "80:80"    # HTTP — redirect ke HTTPS
      - "443:443"  # HTTPS — TLS termination
      # Port 8080 (API) TIDAK di-expose — akses via resolute-traefik.${BASE_DOMAIN}
    volumes:
      # Static config (hasil render dari traefik.yml.template — gitignored)
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      # Dynamic config directory (hot reload)
      - ./config/dynamic:/etc/traefik/dynamic:ro
      # Basic auth credentials (generated by make init — gitignored)
      - ./config/auth/htpasswd:/etc/traefik/auth/htpasswd:ro
      # step-ca root CA cert (di-copy setelah step-ca start — gitignored)
      - ./config/certs/root_ca.crt:/etc/traefik/certs/root_ca.crt:ro
      # TLS cert storage — WAJIB chmod 600 (dilakukan oleh make init)
      - ./data/acme.json:/etc/traefik/acme/acme.json
      # F15 FIX: Access log volume mount
      - ./data/access.log:/var/log/traefik/access.log
      # Docker provider — read-only
      - /var/run/docker.sock:/var/run/docker.sock:ro
      
    mem_limit: ${TRAEFIK_MEM_LIMIT}
    
    cpus: ${TRAEFIK_CPUS}
    
    healthcheck:
      # traefik healthcheck --ping menggunakan built-in ping endpoint
      # WAJIB: 'ping: {}' harus ada di static config (traefik.yml.template)
      # Return 0 hanya jika Traefik benar-benar memproses request
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # Dashboard routing
      - "traefik.http.routers.traefik.rule=Host(`resolute-traefik.${BASE_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=step-ca"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=basic-auth@file"
      # ---- Observability (uncomment saat Loki/Prometheus stack deployed) ----
      # - "logging=promtail"
      # - "logging_jobname=traefik"

networks:
  infra-proxy-net:
    external: true
